---
apiVersion: v1
kind: Namespace
metadata:
  name: arcane-ingestion
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: arcane-ingestion
  namespace: arcane-ingestion
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: arcane-ingestion-dataroutes
rules:
  - apiGroups: ["ingestion.sneaksanddata.com"]
    resources: ["dataroutes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: arcane-ingestion-dataroutes
subjects:
  - kind: ServiceAccount
    name: arcane-ingestion
    namespace: arcane-ingestion
roleRef:
  kind: ClusterRole
  name: arcane-ingestion-dataroutes
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arcane-ingestion
  namespace: arcane-ingestion
  labels:
    app.kubernetes.io/name: arcane-ingestion
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: arcane-ingestion
  template:
    metadata:
      labels:
        app.kubernetes.io/name: arcane-ingestion
    spec:
      serviceAccountName: arcane-ingestion
      containers:
        - name: arcane-ingestion
          # Built locally and loaded into kind via:
          #   docker build -t arcane-ingestion:dev -f .container/Dockerfile .
          #   kind load docker-image arcane-ingestion:dev
          image: app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8085
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: arcane-ingestion
  namespace: arcane-ingestion
  labels:
    app.kubernetes.io/name: arcane-ingestion
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: arcane-ingestion
  ports:
    - name: http
      port: 8085
      targetPort: http
