apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  # name must match the spec fields below, and be in the form: <plural>.<group>
  name: dataroutes.pushstream.sneaksanddata.com
spec:
  # group name to use for REST API: /apis/<group>/<version>
  group: pushstream.sneaksanddata.com
  scope: Namespaced
  names:
    plural: dataroutes
    singular: dataroute
    kind: DataRoute
    shortNames:
      - dr
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - consumerId
                - schemaSubject
                - schemaVersion
              properties:
                consumerId:
                  type: string
                  description: |
                    Identifier of the consumer this route belongs to. Determines the URL path
                    segment exposed by the ingestion server, i.e.
                    POST /api/<apiVersion>/<consumerId>/data
                  pattern: '^[a-z0-9]([-a-z0-9]{0,61}[a-z0-9])?$'
                  minLength: 1
                  maxLength: 63
                payloadSchema:
                  type: string
                  description: |
                    Optional Apache Avro schema (a record schema), serialized as a JSON string,
                    that incoming request payloads for this route must validate against before
                    being enqueued. The server parses this string into an Avro Schema once at
                    load time, then for each request:
                      1. parses the JSON body using Avro's JSON decoder against this schema
                         (this both validates the payload and produces a GenericRecord),
                      2. encodes the GenericRecord to Avro binary,
                      3. stores the resulting bytes in the DynamoDB `payload` (Binary) attribute.
                    If set, `schemaSubject` and `schemaVersion` must also be provided so the
                    downstream parquet writer can resolve the writer schema.
                  minLength: 1
                schemaSubject:
                  type: string
                  description: |
                    Logical name of the Avro schema family bound to this route (e.g. "orders").
                    Persisted as the DynamoDB `schemaSubject` attribute on every item so the
                    downstream consumer can route to the correct schema family.
                  pattern: '^[a-zA-Z_][a-zA-Z0-9_.-]{0,127}$'
                  minLength: 1
                  maxLength: 128
                schemaVersion:
                  type: integer
                  description: |
                    Monotonically increasing version of the Avro schema within `schemaSubject`.
                    Persisted as the DynamoDB `schemaVersion` (Number) attribute on every item.
                  minimum: 1
                iceberg:
                  type: object
                  description: |
                    Optional Iceberg target table definition. When set, the ingestion service
                    ensures the referenced table exists in the REST catalog at startup (and
                    whenever a new DataRoute is observed). Tables are created idempotently:
                    if the table already exists, the spec is left untouched. Schema-evolution
                    checks are intentionally deferred — this initial implementation only handles
                    the create-if-missing case.
                  required: [catalogUri, warehouse, namespace, tableName, columns]
                  properties:
                    catalogUri:
                      type: string
                      description: REST catalog endpoint URI (e.g. http://lakekeeper:20001/catalog).
                      minLength: 1
                    warehouse:
                      type: string
                      description: Warehouse identifier registered in the catalog.
                      minLength: 1
                    namespace:
                      type: string
                      description: Namespace under which the table is created (must already exist).
                      minLength: 1
                    tableName:
                      type: string
                      description: Table name within the namespace.
                      pattern: '^[A-Za-z_][A-Za-z0-9_]{0,127}$'
                      minLength: 1
                      maxLength: 128
                    columns:
                      type: array
                      description: |
                        Ordered list of columns. Field-ids are assigned sequentially starting
                        at 1 in declaration order; do not change ordering after creation.
                      minItems: 1
                      items:
                        type: object
                        required: [name, type]
                        properties:
                          name:
                            type: string
                            minLength: 1
                          type:
                            type: string
                            description: |
                              Logical Iceberg type. Supported values:
                              string, int, long, double, float, boolean, binary, date,
                              timestamp (UTC-adjusted).
                            enum: [string, int, long, double, float, boolean, binary, date, timestamp]
                          required:
                            type: boolean
                            default: false
                    initialProperties:
                      type: object
                      description: |
                        Optional key/value table properties seeded once at creation time
                        (e.g. `comment` to bootstrap the stream-pull plugin's watermark).
                        Ignored if the table already exists. Keys and values are passed
                        verbatim to Iceberg's UpdateProperties API.
                      additionalProperties:
                        type: string
      additionalPrinterColumns:
        - name: Consumer
          type: string
          jsonPath: .spec.consumerId
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
