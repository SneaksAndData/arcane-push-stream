# Local development / kind e2e overrides.
# Usage:
#   helm install arcane-ingestion .helm -f .helm/values.yaml -f .helm/values-dev.yaml
#
# Assumes the shared kind data plane from arcane-stream-pull is already applied
# to the same namespace (provides an in-cluster `dynamodb-local` Service):
#   (cd ../arcane-stream-pull && just kind-data-up)

environment: "Development"

image:
  repository: "arcane-push-stream"
  tag: "latest"
  pullPolicy: "IfNotPresent"

replicaCount: 1

# Point DynamoDB at the in-cluster dynamodb-local and auto-create the table
# on startup (dynamodb-local runs with -inMemory, so the table vanishes on pod
# restart — the ingestion service must recreate it).
settings:
  dynamodb:
    region: "us-east-1"
    tableName: "arcane_ingestion"
    endpoint: "http://dynamodb-local.default.svc.cluster.local:8000"
    autoCreateTable: true

# dynamodb-local accepts any credentials; supply dummies via env for the AWS SDK.
extraEnv:
  - name: AWS_ACCESS_KEY_ID
    value: "minioadmin"
  - name: AWS_SECRET_ACCESS_KEY
    value: "minioadmin"
  - name: AWS_REGION
    value: "us-east-1"

# Loosen resource defaults for laptops.
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

