name: Release a new version

on: workflow_dispatch

jobs:
  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Create Release
        uses: SneaksAndData/github-actions/semver_release@6c8187f0d8c167a9410a76bed2e98409449ed495 # v0.1.11
        with:
          major_v: 0
          minor_v: 1
