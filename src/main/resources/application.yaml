server:
  host: "0.0.0.0"
  port: 8085
  nThreads: 2
  # Maximum accepted request body size in bytes. Requests above this are rejected with 413.
  maxContentLengthBytes: 409600

router:
  # Routed-data API version, becomes part of the HTTP POST prefix: /api/<apiVersion>/<consumer>/data.
  apiVersion: "v2"

dynamodb:
  region: "us-east-1"
  tableName: "arcane-ingestion-tokens"
  # Override endpoint for dynamodb-local / dev. Remove or comment out in production to use real AWS.
  endpoint: "http://localhost:8000"
  # Auto-create the table on startup. Useful for local dev; should be false in prod (use IaC).
  autoCreateTable: true

observability:
  # Identifies the service in metric tags and log MDC. Also becomes the `stream_kind` tag
  # applied by arcane-framework's GlobalMetricTagProvider to every metric.
  serviceName: "push-stream"
  # Static key/value tags added to every emitted metric (deployment, environment, region, ...).
  metricTags: {}
  datadog:
    # Master switch. Leave `false` locally; enable in environments where the DataDog agent is available.
    enabled: false
    # DogStatsD Unix-domain-socket path. Only used when `enabled: true`.
    socketPath: "/var/run/datadog/dsd.socket"
    # Metric flush interval to the DogStatsD socket, in seconds.
    publisherIntervalSeconds: 5
